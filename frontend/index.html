<!DOCTYPE html>
<html lang="en">
<head>
    <title>Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">CampusRecover</div>
        <div class="nav-links">
            <button onclick="showPage('home')">Home</button>
            <button onclick="showPage('report')">Post Item</button>
            <button onclick="showPage('admin')" id="adminBtn" style="display:none;">Admin Panel</button>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div id="auth-container" class="container">
        <div class="form-box">
            <h2 id="auth-title">Login</h2>
            <input type="email" id="email" placeholder="Campus Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()" class="main-btn">Submit</button>
            <p onclick="toggleAuth()" id="auth-toggle">Need an account? Register</p>
        </div>
    </div>

    <main id="main-content" style="display:none;">
        <section id="home-page" class="page">
            <h2>Recent Items</h2>
            <div class="filter-bar">
                <button onclick="filterItems('all')">All</button>
                <button onclick="filterItems('lost')">Lost</button>
                <button onclick="filterItems('found')">Found</button>
            </div>
            <div id="items-grid" class="grid"></div>
        </section>

        <section id="report-page" class="page" style="display:none;">
            <h2>Report an Item</h2>
            <form id="item-form">
                <input type="text" placeholder="Item Name (e.g., Blue Wallet)" required>
                <select>
                    <option value="lost">I Lost This</option>
                    <option value="found">I Found This</option>
                </select>
                <textarea placeholder="Description and Last Seen Location"></textarea>
                <button type="submit" class="main-btn">Post to Board</button>
            </form>
        </section>

        <section id="admin-page" class="page" style="display:none;">
            <h2>Moderation Queue</h2>
            <table id="admin-table">
                <tr><th>Item</th><th>User</th><th>Action</th></tr>
                <tr><td>MacBook Pro</td><td>alex_22</td><td><button class="del-btn">Remove</button></td></tr>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
